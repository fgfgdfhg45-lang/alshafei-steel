<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة الشافعي ستيل | كشف قبض العمال</title>
<style>
  :root{
    --navy:#16235c;
    --navy-deep:#0d1740;
    --orange:#f3941e;
    --orange-deep:#d97c0b;
    --bg:#f1f3f8;
    --panel:#ffffff;
    --ink:#1c2240;
    --muted:#6b7290;
    --line:#e2e5f0;
    --warn:#c0392b;
    --good:#1f8a5f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Tahoma','Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--ink);
  }

  /* ===== Header ===== */
  header{
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    padding:14px 26px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:4px solid var(--orange);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand img{
    width:54px;
    height:54px;
    border-radius:50%;
    background:#fff;
    padding:2px;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  .brand-text h1{margin:0;font-size:18px;letter-spacing:0.3px;}
  .brand-text .sub{font-size:11.5px;opacity:0.78;margin-top:2px;}
  .topbtns button{
    background:var(--orange);
    color:#1c1300;
    border:none;
    border-radius:9px;
    padding:10px 18px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    margin-inline-start:8px;
    transition:transform .12s ease, background .12s ease;
  }
  .topbtns button:hover{background:var(--orange-deep);transform:translateY(-1px);}
  .topbtns button.secondary{
    background:transparent;
    color:#fff;
    border:1px solid rgba(255,255,255,0.45);
  }
  .topbtns button.secondary:hover{background:rgba(255,255,255,0.1);}

  .layout{
    display:flex;
    min-height:calc(100vh - 78px);
  }

  /* ===== Sidebar ===== */
  nav.sidebar{
    width:240px;
    background:#fbfbfe;
    border-left:1px solid var(--line);
    padding:18px 14px;
    flex-shrink:0;
  }
  nav.sidebar h3{margin:0 0 12px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:0 6px;}
  .worker-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border-radius:10px;
    margin-bottom:6px;
    cursor:default;
    font-size:14px;
    border:1px solid transparent;
    transition:background .12s ease;
  }
  .worker-item .wi-name{flex:1;cursor:pointer;padding:3px 0;}
  .wi-arrows{display:flex;flex-direction:column;gap:1px;}
  .wi-arrows .arrow{
    background:transparent;
    border:none;
    color:var(--muted);
    font-size:9px;
    line-height:1;
    padding:2px 4px;
    cursor:pointer;
    border-radius:4px;
  }
  .wi-arrows .arrow:hover{background:#e6e9f5;color:var(--navy);}
  .wi-arrows .arrow:disabled{opacity:0.2;cursor:default;}
  .wi-arrows .arrow:disabled:hover{background:transparent;}
  .worker-item.active .wi-arrows .arrow{color:rgba(255,255,255,0.7);}
  .worker-item.active .wi-arrows .arrow:hover{background:rgba(255,255,255,0.15);color:#fff;}
  .worker-item:hover{background:#eef0f9;}
  .worker-item.active{
    background:var(--navy);
    color:#fff;
  }
  .worker-item .del{
    opacity:0.45;
    font-size:12px;
    padding:2px 6px;
    border-radius:5px;
  }
  .worker-item .del:hover{opacity:1;color:var(--warn);background:rgba(192,57,43,0.1);}
  .add-worker{
    width:100%;
    padding:11px;
    border:1.5px dashed var(--navy);
    background:transparent;
    color:var(--navy);
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
    font-weight:bold;
    margin-top:10px;
    transition:background .12s ease;
  }
  .add-worker:hover{background:#eef0f9;}

  main{
    flex:1;
    padding:26px;
    max-width:760px;
  }
  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:90px 20px;
    font-size:15px;
  }

  /* ===== Form cards ===== */
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px 22px;
    margin-bottom:18px;
    box-shadow:0 1px 3px rgba(22,35,92,0.04);
  }
  .card h2{
    margin:0 0 14px;
    font-size:14.5px;
    color:var(--navy);
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2 .dot{
    width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;
  }
  label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px;}
  input[type=text], input[type=number]{
    width:100%;
    padding:10px 12px;
    border:1.5px solid var(--line);
    border-radius:9px;
    font-size:14px;
    background:#fbfcfe;
    transition:border-color .12s ease;
  }
  input[type=text]:focus, input[type=number]:focus{
    outline:none;
    border-color:var(--navy);
    background:#fff;
  }
  input[type=number]{
    direction:ltr;
    text-align:left;
  }
  #f_salary, #f_advance, #f_absent, #f_discount, #f_overtime, #f_late, #f_carryPrev, #f_carryNew, #f_carryDeduct, #f_holiday, #f_joinDay{
    direction:ltr;
    text-align:left;
  }
  .name-input{
    font-size:19px;
    font-weight:bold;
    border:none;
    border-bottom:2px solid var(--line);
    border-radius:0;
    background:transparent;
    padding:6px 2px;
    width:100%;
    color:var(--navy);
  }
  .name-input:focus{outline:none;border-bottom-color:var(--orange);}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:160px;}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;}
  .result-line{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    padding:8px 0;
    border-bottom:1px dashed var(--line);
  }
  .result-line b{color:var(--ink);}
  .result-line.minus b{color:var(--warn);}
  .result-line.plus b{color:var(--good);}
  .total-box{
    margin-top:16px;
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    border-radius:12px;
    padding:16px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:15px;
    border-bottom:3px solid var(--orange);
  }
  .total-box b{font-size:24px;color:var(--orange);}
  .rates{
    display:flex;
    gap:18px;
    font-size:12px;
    color:var(--muted);
    margin-top:10px;
    background:#f6f7fb;
    padding:10px 14px;
    border-radius:9px;
  }
  .rates span b{color:var(--navy);}

  /* === Cards summary screen === */
  .cards-screen{display:none;}
  .cards-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
  }
  .cards-toolbar button{
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:9px;
    padding:10px 18px;
    cursor:pointer;
    font-size:14px;
    font-weight:bold;
  }
  .cards-toolbar button:hover{background:var(--navy-deep);}
  .cards-toolbar button.ghost{
    background:transparent;
    color:var(--navy);
    border:1.5px solid var(--navy);
  }
  .cards-toolbar button.ghost:hover{background:#eef0f9;}

  .print-page{
    background:#fff;
    width:100%;
    max-width:920px;
    margin:0 auto 26px;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(3,auto);
    gap:16px;
    padding:18px;
    border:1px solid var(--line);
    border-radius:10px;
  }
  .pay-card{
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:0;
    font-size:12.5px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .pay-card .pc-head{
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    padding:9px 13px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:3px solid var(--orange);
  }
  .pay-card .pc-head .wname{font-size:14.5px;font-weight:bold;}
  .pay-card .pc-head .wsalary{font-size:11px;opacity:0.85;}
  .pay-card .pc-body{padding:10px 13px;flex:1;}
  .pay-card .line{
    display:flex;
    justify-content:space-between;
    padding:3.5px 0;
    border-bottom:1px dotted var(--line);
  }
  .pay-card .line:last-of-type{border-bottom:none;}
  .pay-card .line .lbl{color:var(--muted);}
  .pay-card .line.total{
    margin-top:6px;
    padding-top:8px;
    border-top:1.5px solid var(--line);
    border-bottom:none;
    font-weight:bold;
    font-size:14.5px;
    color:var(--navy);
  }
  .pay-card .pc-foot{
    background:#f6f7fb;
    padding:5px 13px;
    font-size:9.5px;
    color:var(--muted);
    text-align:center;
    border-top:1px solid var(--line);
  }
  .empty-slot{visibility:hidden;}

  .grand-total{
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:#fff;
    border-radius:14px;
    padding:18px 22px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:4px solid var(--orange);
    max-width:920px;
    margin-inline:auto;
  }
  .grand-total .gt-label{font-size:14px;opacity:0.85;}
  .grand-total .gt-label small{display:block;font-size:11px;opacity:0.7;margin-top:3px;}
  .grand-total .gt-value{font-size:28px;font-weight:bold;color:var(--orange);}
  .grand-total.gt-hidden{display:none !important;}

  /* === Archive screen === */
  .archive-screen{display:none;}
  .archive-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:14px;
  }
  .archive-box{
    background:var(--panel);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:18px 16px;
    cursor:pointer;
    text-align:center;
    transition:border-color .12s ease, transform .12s ease;
  }
  .archive-box:hover{border-color:var(--orange);transform:translateY(-2px);}
  .archive-box .ic{font-size:30px;margin-bottom:8px;}
  .archive-box .lbl{font-weight:bold;color:var(--navy);font-size:14px;}
  .archive-box .cnt{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .archive-current-banner{
    background:#fff7ec;
    border:1.5px dashed var(--orange);
    border-radius:12px;
    padding:12px 16px;
    font-size:13px;
    color:var(--orange-deep);
    margin-bottom:18px;
  }

  @media print{
    *{
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
      color-adjust:exact !important;
    }
    header,.sidebar,.cards-toolbar,.topbtns,.archive-current-banner{display:none !important;}
    body{background:#fff;}
    .layout{display:block;}
    main{padding:0;max-width:100%;}
    .print-page{
      box-shadow:none;
      border:none;
      page-break-after:always;
      margin:0 auto;
    }
  }
  @media (max-width: 700px){
    .layout{flex-direction:column;}
    nav.sidebar{width:100%;border-left:none;border-bottom:1px solid var(--line);}
    main{max-width:100%;}
    .print-page{grid-template-columns:1fr;}
  }
</style>
</head>

// ===== Storage layer =====
// This file is meant to be saved and reopened from disk, so it relies on the
// browser's own localStorage (persists automatically between visits to this
// exact file). If running inside an environment that provides window.storage,
// that is used instead.
const useArtifactStorage = (typeof window !== 'undefined' && !!window.storage);

async function storeGet(key){
  if(useArtifactStorage){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem('payroll:' + key); }catch(e){ return null; }
}
async function storeSet(key, value){
  if(useArtifactStorage){
    try{ await window.storage.set(key, value, false); return true; }catch(e){ return false; }
  }
  try{ localStorage.setItem('payroll:' + key, value); return true; }catch(e){ return false; }
}
async function storeDelete(key){
  if(useArtifactStorage){
    try{ await window.storage.delete(key, false); return true; }catch(e){ return false; }
  }
  try{ localStorage.removeItem('payroll:' + key); return true; }catch(e){ return false; }
}

async function loadAll(){
  try{
    const raw = await storeGet('workers-list');
    const ids = raw ? JSON.parse(raw) : [];
    workers = [];
    for(const id of ids){
      try{
        const wraw = await storeGet('worker:' + id);
        if(wraw) workers.push(JSON.parse(wraw));
      }catch(e){}
    }
  }catch(e){
    workers = [];
  }
  if(workers.length > 0){ activeId = workers[0].id; }
  renderSidebar();
  renderForm();
}

async function saveWorkerList(){
  const ids = workers.map(w => w.id);
  await storeSet('workers-list', JSON.stringify(ids));
}

async function saveWorker(w){
  await storeSet('worker:' + w.id, JSON.stringify(w));
}

async function deleteWorkerStorage(id){
  await storeDelete('worker:' + id);
}

function parseTimeSum(text){
  if(!text) return 0;
  const parts = text.split(/[+,،\s]+/).filter(Boolean);
  let totalHours = 0;
  for(let p of parts){
    if(p.includes(':')){
      const sp = p.split(':');
      const h = parseFloat(sp[0]) || 0;
      const m = parseFloat(sp[1]) || 0;
      totalHours += h + (m / 60);
    } else {
      // plain decimal number = decimal hours (e.g. 8.8 = 8.8 hours)
      totalHours += parseFloat(p) || 0;
    }
  }
  return totalHours;
}

function computeWorker(w){
  const salary = parseFloat(w.salary) || 0;
  const dayRate = salary / 30;
  const hourRate = dayRate / 10;

  const overtimeHours = parseTimeSum(w.overtimeText);
  const overtimeAmount = overtimeHours * hourRate * 1.5;

  const lateHours = parseTimeSum(w.lateText);
  const lateAmount = lateHours * hourRate;

  const advance = parseFloat(w.advance) || 0;

  const absentDays = parseFloat(w.absentDays) || 0;
  const countedAbsentDays = Math.max(0, absentDays - 1);
  const absentAmount = countedAbsentDays * dayRate;

  const discount = parseFloat(w.discount) || 0;

  const holidayDays = parseFloat(w.holidayDays) || 0;
  const holidayAmount = holidayDays * dayRate;

  const joinDay = parseFloat(w.joinDay) || 0;
  const workedDays = joinDay > 0 ? Math.max(0, 30 - joinDay) : 30;
  const baseSalary = joinDay > 0 ? (dayRate * workedDays) : salary;

  const carryPrev = parseFloat(w.carryPrev) || 0;
  const carryNew = parseFloat(w.carryNew) || 0;
  const carryDeduct = parseFloat(w.carryDeduct) || 0;
  const carryBalance = carryPrev + carryNew;
  const carryRemaining = Math.max(0, carryBalance - carryDeduct);

  const total = baseSalary + overtimeAmount + holidayAmount - lateAmount - advance - absentAmount - discount - carryDeduct;

  return { salary, dayRate, hourRate, overtimeHours, overtimeAmount, lateHours, lateAmount,
           advance, absentDays, countedAbsentDays, absentAmount, discount,
           holidayDays, holidayAmount, joinDay, workedDays, baseSalary,
           carryPrev, carryNew, carryDeduct, carryBalance, carryRemaining, total };
}

function fmt(n){
  return (Math.round(n*100)/100).toLocaleString('ar-EG');
}

function renderSidebar(){
  const list = $('#workerList');
  list.innerHTML = '';
  workers.forEach((w, idx) => {
    const div = document.createElement('div');
    div.className = 'worker-item' + (w.id === activeId ? ' active' : '');
    div.innerHTML = `
      <div class="wi-arrows">
        <button class="arrow" data-dir="up" title="نقل لأعلى" ${idx === 0 ? 'disabled' : ''}>▲</button>
        <button class="arrow" data-dir="down" title="نقل لأسفل" ${idx === workers.length - 1 ? 'disabled' : ''}>▼</button>
      </div>
      <span class="wi-name">${escapeHtml(w.name || 'بدون اسم')}</span>
      <span class="del" title="حذف">✕</span>`;
    div.querySelector('.wi-name').onclick = () => { activeId = w.id; currentScreen='form'; renderAll(); };
    div.querySelectorAll('.arrow').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        if(btn.disabled) return;
        const dir = btn.dataset.dir;
        const i = workers.findIndex(x => x.id === w.id);
        const j = dir === 'up' ? i - 1 : i + 1;
        if(j < 0 || j >= workers.length) return;
        [workers[i], workers[j]] = [workers[j], workers[i]];
        await saveWorkerList();
        renderSidebar();
      };
    });
    div.querySelector('.del').onclick = async (e) => {
      e.stopPropagation();
      if(confirm('هل تريد حذف هذا العامل؟')){
        await deleteWorkerStorage(w.id);
        workers = workers.filter(x => x.id !== w.id);
        await saveWorkerList();
        if(activeId === w.id) activeId = workers.length ? workers[0].id : null;
        renderAll();
      }
    };
    list.appendChild(div);
  });
}

function updateComputedOnly(w){

function buildCardsInto(container, list, monthText){
  container.innerHTML = '';
  if(!list || list.length === 0){
    container.innerHTML = `<div class="empty-state">لا يوجد عمال لعرض كروتهم.</div>`;
    return;
  }

  let grandTotal = 0;
  list.forEach(w => {
    const r = w.computed || computeWorker(w);
    grandTotal += r.total;
  });
  const totalsBox = document.createElement('div');
  totalsBox.className = 'grand-total';
  totalsBox.innerHTML = `
    <span class="gt-label">إجمالي القبض الشهري المطلوب من المدير<small>${escapeHtml(monthText)} &middot; ${list.length} عامل</small></span>
    <span class="gt-value">${fmt(grandTotal)} ج</span>
  `;
  container.appendChild(totalsBox);

  const perPage = 6;
  for(let i = 0; i < list.length; i += perPage){
    const chunk = list.slice(i, i + perPage);
    const page = document.createElement('div');
    page.className = 'print-page';
    chunk.forEach(w => {
      const r = w.computed || computeWorker(w);
      const card = document.createElement('div');
      card.className = 'pay-card';
      card.innerHTML = `
        <div class="pc-head">
          <span class="wname">${escapeHtml(w.name)}</span>
          <span class="wsalary">${r.joinDay > 0 ? fmt(r.baseSalary) + ' ج (' + r.workedDays + ' يوم)' : fmt(r.salary) + ' ج / شهرياً'}</span>
        </div>
        <div class="pc-body">
          <div class="line"><span class="lbl">إضافي</span><span>+${fmt(r.overtimeAmount)} ج</span></div>
          <div class="line"><span class="lbl">إجازة رسمية (${r.holidayDays} يوم)</span><span>+${fmt(r.holidayAmount)} ج</span></div>
          <div class="line"><span class="lbl">تأخير</span><span>-${fmt(r.lateAmount)} ج</span></div>
          <div class="line"><span class="lbl">سلف</span><span>-${fmt(r.advance)} ج</span></div>
          <div class="line"><span class="lbl">غياب (${r.countedAbsentDays} يوم)</span><span>-${fmt(r.absentAmount)} ج</span></div>
          <div class="line"><span class="lbl">ترحيل</span><span>-${fmt(r.carryDeduct)} ج</span></div>
          <div class="line"><span class="lbl">خصومات</span><span>-${fmt(r.discount)} ج</span></div>
          <div class="line total"><span>الصافي المستحق</span><span>${fmt(r.total)} ج</span></div>
        </div>
        <div class="pc-foot">شركة الشافعي ستيل للصناعات الهندسية &middot; ${escapeHtml(monthText)}${r.carryRemaining > 0 ? ' &middot; متبقي مرحّل: ' + fmt(r.carryRemaining) + ' ج' : ''}</div>
      `;
      page.appendChild(card);
    });
    for(let j = chunk.length; j < perPage; j++){
      const empty = document.createElement('div');
      empty.className = 'pay-card empty-slot';
      page.appendChild(empty);
    }
    container.appendChild(page);
  }
}

// ===== Archive (monthly snapshots) =====
const MONTH_NAMES = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function currentMonthLabel(){
  const d = new Date();
  return 'كشف شهر ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
}

async function getArchiveIndex(){
  try{
    const raw = await storeGet('archives-list');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}

async function saveArchiveForCurrentMonth(){
  if(workers.length === 0) return;
  const key = currentMonthKey();
  const label = currentMonthLabel();
  const snapshot = workers.map(w => ({ ...w, computed: computeWorker(w) }));
  await storeSet('archive:' + key, JSON.stringify({ id: key, label, savedAt: Date.now(), workers: snapshot }));
  let index = await getArchiveIndex();
  if(!index.includes(key)){
    index.push(key);
    await storeSet('archives-list', JSON.stringify(index));
  }
}

async function renderArchiveGrid(){
  const grid = $('#archiveGrid');
  grid.innerHTML = '<div class="empty-state">جاري التحميل...</div>';
  const index = await getArchiveIndex();
  if(index.length === 0){
    grid.innerHTML = '<div class="empty-state">لسه مفيش كشوفات محفوظة. اضغط "تحديث القبض" أول مرة عشان يتحفظ كشف الشهر ده تلقائي.</div>';
    return;
  }
  index.sort().reverse();
  grid.innerHTML = '';
  for(const key of index){
    try{
      const raw = await storeGet('archive:' + key);
      if(!raw) continue;
      const data = JSON.parse(raw);
      const box = document.createElement('div');
      box.className = 'archive-box';
      box.innerHTML = `<div class="ic">📋</div><div class="lbl">${escapeHtml(data.label)}</div><div class="cnt">${data.workers.length} عامل</div>`;
      box.onclick = () => openArchive(key);
      grid.appendChild(box);
    }catch(e){}
  }
}

async function openArchive(key){
  const raw = await storeGet('archive:' + key);
  if(!raw){ alert('تعذر فتح هذا الكشف.'); return; }
  const data = JSON.parse(raw);
  $('#archiveListView').style.display = 'none';
  $('#archiveDetailView').style.display = 'block';
  buildCardsInto($('#archiveDetailContainer'), data.workers, data.label);
  applyTotalVisibility();
}

function applyTotalVisibility(){
  document.querySelectorAll('.grand-total').forEach(el => {
    el.classList.toggle('gt-hidden', totalHidden);
  });
  const label = totalHidden ? '👁️ إظهار الإجمالي' : '🙈 إخفاء الإجمالي';
  const b1 = $('#toggleTotalBtn'); if(b1) b1.innerText = label;
  const b2 = $('#toggleTotalBtn2'); if(b2) b2.innerText = label;
}
$('#toggleTotalBtn').addEventListener('click', () => { totalHidden = !totalHidden; applyTotalVisibility(); });
$('#toggleTotalBtn2').addEventListener('click', () => { totalHidden = !totalHidden; applyTotalVisibility(); });

function setMonthLabel(){
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const d = new Date();
  $('#monthLabel').innerText = 'كشف شهر ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

setMonthLabel();
loadAll();
</script>
